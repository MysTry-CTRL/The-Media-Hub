<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <link rel="icon" href="Logo.png" type="image/png">
        <link rel="stylesheet" href="style.css">
        <title>Our Works | The Media Hub</title>
    </head>
    <body class="works-page">
        <nav class="topbar">
            <div class="logo-seg">
                <a href="index.html">
                    <img src="Logo.png" alt="The Media Hub logo">
                </a>
            </div>

            <div class="nav-seg">
                <a href="index.html#home">Home</a>
                <a href="index.html#works">Works</a>
                <a href="index.html#contact">Contact</a>
            </div>

            <div class="btn-seg">
                <a href="call.html" rel="noopener noreferrer">
                    <button>Call Us!</button>
                </a>
            </div>
        </nav>

        <section class="hero works-hero">
            <div class="hero-text">
                <h1>Our Works</h1>
                <h4>A growing showcase of the media coverage, creative production, and event support we have delivered with clubs across campus.</h4>
            </div>
        </section>
        <section class="filter">

        </section>
        <section class="jtc" id="jtc">

            </div>
        </section>
        <footer>
            <div class="footer-logo">
                <img src="Logo.png" alt="The Media Hub logo">
            </div>
            <div class="footer-text">
                <p>© 2026 The Media Hub. All rights reserved.</p>
                <p><a href="admin-dashboard.html">Admin Dashboard</a></p>
            </div>
